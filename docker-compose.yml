version: "3.9"

services:
  db:
    image: postgres:15-alpine
    platform: linux/amd64
    environment:
      POSTGRES_DB: community_forum
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: milomilo
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d community_forum"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: